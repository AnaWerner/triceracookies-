<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TriceraCookies | Crocância que atravessa eras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #fafaf5; color: #2d3e2b; scroll-behavior: smooth; }
        :root { --green-primary: #99CD85; --green-secondary: #CFE0BC; --green-dark: #5f8b4a; --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05); --shadow-md: 0 20px 25px -12px rgba(0,0,0,0.08); }
        .navbar { background: white; box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 50; padding: 0.8rem 2rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
        .logo-area { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
        .logo { font-family: 'Patrick Hand', cursive; font-size: 1.9rem; font-weight: 700; color: var(--green-primary); letter-spacing: 1px; text-shadow: 2px 2px 0 #e2f0da; }
        .lema { font-size: 0.8rem; background: var(--green-secondary); padding: 0.2rem 0.8rem; border-radius: 40px; font-weight: 500; color: #3b5a2e; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 1.8rem; align-items: center; }
        .nav-links a { text-decoration: none; font-weight: 600; color: #3c5436; transition: 0.2s; font-size: 0.95rem; cursor: pointer; background: none; border: none; font-family: inherit; }
        .nav-links a:hover, .nav-links .active { color: #2a7a2e; border-bottom: 2px solid var(--green-primary); padding-bottom: 4px; }
        .container { max-width: 1280px; margin: 0 auto; padding: 3rem 1.5rem; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px);} to { opacity: 1; transform: translateY(0);} }
        .hero { background: linear-gradient(135deg, var(--green-secondary) 0%, #ddecd0 100%); border-radius: 2.5rem; padding: 3rem 2rem; margin-bottom: 2rem; text-align: center; box-shadow: var(--shadow-sm); }
        .hero h1 { font-size: 2.5rem; font-weight: 800; color: #2a5730; }
        .btn-cookie { background: var(--green-primary); border: none; border-radius: 60px; padding: 0.7rem 1.8rem; font-weight: 600; color: #1e3a1a; cursor: pointer; transition: 0.2s; margin-top: 1rem; display: inline-block; }
        .btn-cookie:hover { background: #7db868; transform: scale(0.97); }
        .hero-img { width: 100%; height: 240px; margin-top: 1.5rem; background-size: cover; background-position: center; border-radius: 2rem; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin: 2rem 0; }
        .card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.25s; border: 1px solid #e9f3e3; }
        .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
        .card-img { height: 200px; background-size: cover; background-position: center; display: flex; align-items: flex-end; justify-content: flex-start; padding: 0.8rem; }
        .badge-img { background: rgba(255,255,220,0.9); backdrop-filter: blur(4px); border-radius: 40px; padding: 0.2rem 1rem; font-size: 0.75rem; font-weight: 700; color: #2c4d1e; }
        .card-content { padding: 1.4rem; }
        .price { font-weight: 800; font-size: 1.5rem; color: #2f6b2f; margin: 0.5rem 0; }
        .badge { background: var(--green-secondary); border-radius: 30px; padding: 0.2rem 1rem; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .sobre-box, .contato-box { background: white; border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; box-shadow: var(--shadow-sm); border: 1px solid #e2f0da; }
        .sobre-imagem { width: 100%; height: 260px; background-size: cover; background-position: center; border-radius: 1.5rem; margin: 1.5rem 0; }
        .info-contato i { width: 32px; color: var(--green-primary); }
        .horario { background: var(--green-secondary); border-radius: 24px; padding: 1rem; text-align: center; margin-top: 1rem; }
        footer { background: #2d4130; color: #cfdec4; text-align: center; padding: 2rem; margin-top: 2rem; font-size: 0.85rem; }
        .dica-imagem { font-size: 0.8rem; background: #ecf7e5; border-radius: 1rem; padding: 0.3rem 1rem; text-align: center; }
        .filtros-catalogo { display: flex; gap: 1rem; justify-content: center; margin: 2rem 0 1rem; flex-wrap: wrap; }
        .filtro-btn { background: #eef3ea; border: none; padding: 0.6rem 1.5rem; border-radius: 40px; font-weight: 600; color: #2d4a26; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .filtro-btn.active-filtro { background: var(--green-primary); color: #1e3a1a; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .produto-item { transition: 0.2s; }
        .produto-item.ocultar { display: none; }
        @media (max-width: 760px) { .navbar { flex-direction: column; align-items: flex-start; } .hero h1 { font-size: 1.8rem; } .hero-img { height: 160px; } }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    const CONFIG = {
        nomeLoja: "TriceraCookies",
        lema: "Crocância que atravessa eras",
        email: "TriceraCookiesOFC@gmail.com",
        telefone: "(11) 98765-4321",
        endereco: "Av. Paulista, 1000 - Bela Vista, São Paulo - SP",
        horario: "Terça a Sábado, das 8h às 18h",
        
        cores: { principal: "#99CD85", secundaria: "#CFE0BC", escura: "#5f8b4a" },
        
        // SUAS IMAGENS (todas funcionando do Pinterest)
        imagens: {
            bannerHome: "https://i.pinimg.com/736x/ff/3b/63/ff3b6310e864204f9712d7aa6a3e2bf9.jpg",
            sobreLoja: "https://i.pinimg.com/736x/0b/72/ff/0b72ff63efa7af5e2fd2607c2fca7f32.jpg",
            produto1_simples: "https://i.pinimg.com/1200x/66/e5/43/66e54368cb934301357501b93dd2bc93.jpg",
            produto2_simples: "https://i.pinimg.com/736x/83/fb/1a/83fb1ad0054474a45addffcf6cd5e275.jpg",
            produto3_simples: "https://i.pinimg.com/1200x/d6/f9/1a/d6f91a48a33bc2125475ee927f66af4f.jpg",
            produto1_confeitado: "https://i.pinimg.com/1200x/89/09/db/8909dbe248d598e9c030402b1bac3e89.jpg",
            produto2_confeitado: "https://i.pinimg.com/736x/70/c5/90/70c590b6067d50415ba603f93e81452e.jpg",
            produto3_confeitado: "https://i.pinimg.com/736x/87/03/5f/87035f13614411f3f054e5cafc76abf4.jpg"
        },
        
        produtos: [
            { nome: "Cookie Dino Original", descricao: "Manteiga, baunilha e formato de tricerátops. Crocância perfeita.", preco: 2.00, tipo: "simples", imagemKey: "produto1_simples" },
            { nome: "Cookie Mel e Canela", descricao: "Biscoito amanteigado com toque especial de mel.", preco: 2.00, tipo: "simples", imagemKey: "produto2_simples" },
            { nome: "Cookie Limão Siciliano", descricao: "Tradicional com raspas de limão siciliano e cobertura de açúcar.", preco: 2.00, tipo: "simples", imagemKey: "produto3_simples" },
            { nome: "Cookie Rex Chocolate", descricao: "Cobertura de chocolate belga + granulado dino. Irresistível!", preco: 5.00, tipo: "confeitado", imagemKey: "produto1_confeitado" },
            { nome: "Cookie Glacê Jurássico", descricao: "Glacê colorido com estampa de pegadas. Sabor limão e baunilha.", preco: 5.00, tipo: "confeitado", imagemKey: "produto2_confeitado" },
            { nome: "Cookie Confete Dino", descricao: "Chocolate branco com confeitos coloridos de dinossauro.", preco: 5.00, tipo: "confeitado", imagemKey: "produto3_confeitado" }
        ],
        
        historia: "🦕 Uma garota apaixonada por dinossauros e culinária decidiu transformar suas duas paixões em um sonho. Depois de testar várias receitas em casa, ela criou uma loja de biscoitos em formatos de dinossauros, cheia de cores e diversão. Assim nasceu uma lojinha diferente, onde cada biscoito traz um sabor delicioso e um toque da era jurássica. Hoje, nossa cozinha artesanal produz cookies que unem nostalgia e crocância, com ingredientes selecionados e muito amor. Cada mordida é uma aventura no tempo!",
        
        footerTexto: "Biscoitos artesanais com alma pré-histórica"
    };
    
    function aplicarCores() {
        const root = document.documentElement.style;
        root.setProperty('--green-primary', CONFIG.cores.principal);
        root.setProperty('--green-secondary', CONFIG.cores.secundaria);
        root.setProperty('--green-dark', CONFIG.cores.escura);
    }
    
    function getImagemUrl(imagemKey) {
        return CONFIG.imagens[imagemKey];
    }
    
    function renderizarSite() {
        const app = document.getElementById('app');
        
        function gerarCards(produtosArray) {
            return produtosArray.map(prod => {
                const imagemUrl = getImagemUrl(prod.imagemKey);
                const badgeText = prod.tipo === 'confeitado' ? '✨ Confeitado R$ 5,00' : '🍪 Simples R$ 2,00';
                return `
                    <div class="card produto-item" data-tipo="${prod.tipo}">
                        <div class="card-img" style="background-image: url('${imagemUrl}');">
                            <span class="badge-img">${badgeText}</span>
                        </div>
                        <div class="card-content">
                            <h3>${prod.nome}</h3>
                            <p>${prod.descricao}</p>
                            <div class="price">R$ ${prod.preco.toFixed(2)} <span style="font-size:0.9rem;">unidade</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        const todosProdutosHTML = gerarCards(CONFIG.produtos);
        
        const htmlCompleto = `
            <header>
                <div class="navbar">
                    <div class="logo-area">
                        <div class="logo">🦕 ${CONFIG.nomeLoja} <span>🍪</span></div>
                        <div class="lema">"${CONFIG.lema}"</div>
                    </div>
                    <div class="nav-links" id="navLinks">
                        <a data-section="home" class="active">Home</a>
                        <a data-section="produtos">Produtos</a>
                        <a data-section="sobre">Sobre</a>
                        <a data-section="contato">Contato</a>
                    </div>
                </div>
            </header>
            <main class="container">
                <!-- HOME -->
                <div id="home" class="section active-section">
                    <div class="hero">
                        <h1>Biscoitos jurássicos artesanais 🦖🍪</h1>
                        <p>${CONFIG.lema}</p>
                        <button class="btn-cookie" id="explorarBtn">Explorar catálogo →</button>
                        <div class="hero-img" style="background-image: url('${getImagemUrl('bannerHome')}');"></div>
                        <div class="dica-imagem" style="margin-top: 12px;">
                            <i class="fas fa-camera"></i> Cookies fresquinhos saindo do forno!
                        </div>
                    </div>
                    <div style="display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: space-between;">
                        <div style="flex:1; min-width: 200px; background: var(--green-secondary); border-radius: 2rem; padding: 1.5rem; text-align: center;">
                            <i class="fas fa-cookie-bite" style="font-size: 2.5rem; color:#528a3a;"></i>
                            <h3>Biscoitos Simples</h3>
                            <p>A partir de <strong>R$ 2,00</strong> unidade</p>
                        </div>
                        <div style="flex:1; min-width: 200px; background: var(--green-primary); border-radius: 2rem; padding: 1.5rem; text-align: center;">
                            <i class="fas fa-chocolate-bar" style="font-size: 2.5rem; color:#fff2cf;"></i>
                            <h3>Confeitados</h3>
                            <p><strong>R$ 5,00</strong> unidade — cobertura especial!</p>
                        </div>
                        <div style="flex:1; min-width: 200px; background: var(--green-secondary); border-radius: 2rem; padding: 1.5rem; text-align: center;">
                            <i class="fas fa-t-rex" style="font-size: 2.5rem;"></i>
                            <h3>Formato Dinossauro</h3>
                            <p>Stego, T-Rex, Triceratops e mais!</p>
                        </div>
                    </div>
                    <div style="margin-top: 2rem; text-align: center; background: #fff2e0; border-radius: 3rem; padding: 1rem;">
                        <i class="fas fa-store"></i> <strong>${CONFIG.horario}</strong> • ${CONFIG.endereco}
                    </div>
                </div>

                <!-- PRODUTOS COM FILTROS -->
                <div id="produtos" class="section">
                    <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">🍪 Nosso catálogo</h2>
                    <p>Biscoitos fresquinhos, feitos com carinho e formatos pré-históricos.</p>
                    <div class="filtros-catalogo">
                        <button class="filtro-btn active-filtro" data-filtro="todos">🍪 Todos os cookies</button>
                        <button class="filtro-btn" data-filtro="simples">🥠 Apenas Simples</button>
                        <button class="filtro-btn" data-filtro="confeitado">🎨 Apenas Confeitados</button>
                    </div>
                    <div class="grid-produtos" id="produtosGrid">${todosProdutosHTML}</div>
                    <div class="sobre-box" style="background:#f5f7ef;">
                        <p><strong>💡 Dica da chef:</strong> nossos biscoitos <strong>confeitados (R$ 5,00)</strong> têm o melhor custo-benefício. Peça um mix e ganhe brinde surpresa!</p>
                    </div>
                </div>

                <!-- SOBRE -->
                <div id="sobre" class="section">
                    <div class="sobre-box">
                        <h2><i class="fas fa-dragon"></i> A história da ${CONFIG.nomeLoja}</h2>
                        <div class="sobre-imagem" style="background-image: url('${getImagemUrl('sobreLoja')}');"></div>
                        <p style="font-size:1.1rem; margin-top: 1rem;">${CONFIG.historia}</p>
                        <div style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                            <div><i class="fas fa-leaf"></i> Ingredientes naturais</div>
                            <div><i class="fas fa-heart"></i> Receita exclusiva</div>
                            <div><i class="fas fa-dinosaur"></i> Forma personalizada</div>
                        </div>
                    </div>
                    <div class="horario">
                        <i class="far fa-clock"></i> Horário de atendimento: <strong>${CONFIG.horario}</strong><br>
                        <i class="fas fa-map-marker-alt"></i> ${CONFIG.endereco}
                    </div>
                </div>

                <!-- CONTATO -->
                <div id="contato" class="section">
                    <div class="contato-box">
                        <h2><i class="fas fa-headset"></i> Entre em contato</h2>
                        <div class="info-contato" style="margin: 2rem 0; display: flex; flex-direction: column; gap: 1.2rem;">
                            <div><i class="fas fa-envelope"></i> <strong>Email:</strong> <a href="mailto:${CONFIG.email}" style="color:#2d6a2b;">${CONFIG.email}</a></div>
                            <div><i class="fas fa-phone-alt"></i> <strong>Telefone / WhatsApp:</strong> ${CONFIG.telefone}</div>
                            <div><i class="fas fa-map-marker-alt"></i> <strong>Localização:</strong> ${CONFIG.endereco}</div>
                        </div>
                        <div style="background:#e1f0d4; border-radius: 1.5rem; padding: 1rem; text-align:center;">
                            <i class="fas fa-store"></i> Atendimento exclusivamente presencial! Venha nos visitar.
                        </div>
                    </div>
                </div>
            </main>
            <footer>
                <p>🦕 ${CONFIG.nomeLoja} • ${CONFIG.lema}</p>
                <p>© 2025 - ${CONFIG.footerTexto} | ${CONFIG.telefone}</p>
                <p>Email: ${CONFIG.email}</p>
            </footer>
        `;
        
        app.innerHTML = htmlCompleto;
        aplicarCores();
        configurarNavegacao();
        configurarFiltros();
    }
    
    function configurarNavegacao() {
        const sections = ['home', 'produtos', 'sobre', 'contato'];
        const divSections = {};
        sections.forEach(sec => { divSections[sec] = document.getElementById(sec); });
        const navLinks = document.querySelectorAll('.nav-links a');
        
        function activateSection(sectionId) {
            sections.forEach(sec => { if(divSections[sec]) divSections[sec].classList.remove('active-section'); });
            if(divSections[sectionId]) divSections[sectionId].classList.add('active-section');
            navLinks.forEach(link => {
                const linkSection = link.getAttribute('data-section');
                if(linkSection === sectionId) link.classList.add('active');
                else link.classList.remove('active');
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const sectionId = link.getAttribute('data-section');
                if(sectionId && divSections[sectionId]) activateSection(sectionId);
            });
        });
        
        const explorarBtn = document.getElementById('explorarBtn');
        if(explorarBtn) explorarBtn.addEventListener('click', () => activateSection('produtos'));
        if(!document.querySelector('.section.active-section')) activateSection('home');
    }
    
    function configurarFiltros() {
        const botoesFiltro = document.querySelectorAll('.filtro-btn');
        const todosProdutos = document.querySelectorAll('.produto-item');
        if(!botoesFiltro.length) return;
        
        function filtrarProdutos(tipo) {
            todosProdutos.forEach(produto => {
                if(tipo === 'todos') produto.classList.remove('ocultar');
                else {
                    const tipoProduto = produto.getAttribute('data-tipo');
                    if(tipoProduto === tipo) produto.classList.remove('ocultar');
                    else produto.classList.add('ocultar');
                }
            });
            botoesFiltro.forEach(btn => {
                if(btn.getAttribute('data-filtro') === tipo) btn.classList.add('active-filtro');
                else btn.classList.remove('active-filtro');
            });
        }
        
        botoesFiltro.forEach(btn => {
            btn.addEventListener('click', () => {
                const filtro = btn.getAttribute('data-filtro');
                if(filtro) filtrarProdutos(filtro);
            });
        });
    }
    
    renderizarSite();
</script>
</body>
</html>
